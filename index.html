<!DOCTYPE html>
<html>
<head>
<title>MJ's One Session Closer to CA</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:20px;
transition:background 0.4s;
}

#timer{
font-size:60px;
margin:25px 0;
}

button{
padding:12px 25px;
font-size:16px;
margin:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

#readBtn{background:green;color:white;}
#relaxBtn{background:orange;color:white;}
#stopBtn{background:#444;color:white;}
#resetBtn{background:red;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

#log{
max-width:900px;
margin:auto;
margin-top:30px;
}

</style>
</head>

<body>

<h1>MJ's One Session Closer to CA</h1>

<div id="datetime"></div>

<div id="timer">00:00:00</div>

<button id="readBtn" onclick="startRead()">READ</button>
<button id="relaxBtn" onclick="manualRelax()">RELAX</button>
<button id="stopBtn" onclick="stopTimer()">STOP</button>
<button id="resetBtn" onclick="resetTimer()">RESET</button>

<h3>CONTROL TIME CONQUER TITLE</h3>

<div style="font-size:20px;margin-top:10px;">
Total Read Time: <span id="totalRead">00:00</span>
</div>

<div id="log">

<h2>Session Log</h2>

<table>

<tr>
<th>Date</th>
<th>Mode</th>
<th>Minutes</th>
<th>Delete</th>
</tr>

<tbody id="logTable"></tbody>

</table>

</div>

<script>

let mode="";
let startTime=null;
let sessionLength=0;
let relaxStart=null;

let timer=null;

let flickerInterval;
let continuousBeepInterval;

let logs = JSON.parse(localStorage.getItem("studyLogs")) || [];

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(duration=200){

let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value=700;

osc.start();

setTimeout(()=>{osc.stop();},duration);

}

function tripleBeep(){
for(let i=0;i<3;i++){
setTimeout(()=>{beep();},i*300);
}
}

function fiveBeeps(){
for(let i=0;i<5;i++){
setTimeout(()=>{beep();},i*250);
}
}

function startContinuousBeep(){
continuousBeepInterval=setInterval(()=>{beep(150);},400);
}

function stopAlarms(){
clearInterval(continuousBeepInterval);
clearInterval(flickerInterval);
document.body.style.background="#f4f4f4";
}

function formatHM(min){

let h=Math.floor(min/60);
let m=min%60;

return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');

}

function formatTimer(sec){

let h=Math.floor(sec/3600);
let m=Math.floor((sec%3600)/60);
let s=sec%60;

return String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0');

}

function startTimerLoop(){
clearInterval(timer);
timer=setInterval(updateTimer,1000);
}

function startRead(){

stopAlarms();

if(mode==="RELAX"){
logRelax();
}

let minutes=prompt("Enter study session minutes");

if(!minutes || isNaN(minutes)) return;

mode="READ";

sessionLength=parseInt(minutes)*60;

startTime=Date.now();

document.body.style.background="#e8ffe8";

startTimerLoop();

}

function manualRelax(){

if(mode==="READ"){
logRead();
}

startRelax();

}

function startRelax(){

mode="RELAX";

relaxStart=Date.now();

tripleBeep();

document.body.style.background="#ffcccc";

startTimerLoop();

}

function updateTimer(){

if(mode==="READ"){

let elapsed=Math.floor((Date.now()-startTime)/1000);

let remaining=sessionLength-elapsed;

document.getElementById("timer").innerText=formatTimer(Math.max(0,remaining));

if(remaining<=0){

tripleBeep();

logRead();

startRelax();

}

}

else if(mode==="RELAX"){

let elapsed=Math.floor((Date.now()-relaxStart)/1000);

document.getElementById("timer").innerText=formatTimer(elapsed);

if(elapsed===300){
fiveBeeps();
}

if(elapsed===600){
startContinuousBeep();
startFlicker();
}

}

}

function startFlicker(){

let toggle=false;

flickerInterval=setInterval(()=>{

document.body.style.background=
toggle ? "#ff6666" : "#ffcccc";

toggle=!toggle;

},200);

}

function logRead(){

let seconds=Math.floor((Date.now()-startTime)/1000);
let minutes=Math.floor(seconds/60);

logs.unshift({
date:new Date().toLocaleString(),
mode:"READ",
minutes:minutes
});

saveLogs();

}

function logRelax(){

let seconds=Math.floor((Date.now()-relaxStart)/1000);
let minutes=Math.floor(seconds/60);

logs.unshift({
date:new Date().toLocaleString(),
mode:"RELAX",
minutes:minutes
});

saveLogs();

}

function stopTimer(){

stopAlarms();

clearInterval(timer);

if(mode==="READ"){
logRead();
}

if(mode==="RELAX"){
logRelax();
}

mode="";

document.getElementById("timer").innerText="00:00:00";

}

function resetTimer(){

stopAlarms();

clearInterval(timer);

mode="";

document.getElementById("timer").innerText="00:00:00";

}

function deleteLog(index){

logs.splice(index,1);

saveLogs();

}

function saveLogs(){

localStorage.setItem("studyLogs",JSON.stringify(logs));

renderLogs();

}

function renderLogs(){

let table=document.getElementById("logTable");

table.innerHTML="";

let totalRead=0;

logs.forEach((log,index)=>{

let row=table.insertRow();

row.insertCell(0).innerText=log.date;
row.insertCell(1).innerText=log.mode;
row.insertCell(2).innerText=log.minutes+" min";

let del=row.insertCell(3);
del.innerHTML="<button onclick='deleteLog("+index+")'>Delete</button>";

if(log.mode==="READ"){
totalRead+=log.minutes;
}

});

document.getElementById("totalRead").innerText=formatHM(totalRead);

}

function updateDateTime(){
document.getElementById("datetime").innerText=new Date().toLocaleString();
}

setInterval(updateDateTime,1000);

renderLogs();

</script>

</body>
</html>
